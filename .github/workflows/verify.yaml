name: Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.4.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6.0.3
        with:
          node-version: 24
      - uses: pnpm/action-setup@v6.0.8
      - run: pnpm install
      - run: pnpm format:check
